# Deshabilita la versión en headers (seguridad)
server_tokens off;

# Gzip
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css text/javascript application/javascript
           application/json application/xml image/svg+xml
           font/woff font/woff2;

server {
  listen 8080;
  listen [::]:8080;

  root /usr/share/nginx/html;
  index index.html;

  # ── Security headers ──────────────────────────────────────────────────────
  add_header X-Frame-Options           "SAMEORIGIN"           always;
  add_header X-Content-Type-Options    "nosniff"              always;
  add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
  add_header X-XSS-Protection          "1; mode=block"        always;

  # ── SPA routing ──────────────────────────────────────────────────────────
  location / {
    try_files $uri /index.html;
  }

  # ── Activos con hash (Vite genera nombres como assets/index-Abc123.js) ───
  location /assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
    access_log off;
  }

  # ── Otros estáticos (imágenes, SVG, fuentes en /public) ─────────────────
  location ~* \.(?:png|jpg|jpeg|gif|svg|ico|woff2?)$ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=86400";
    access_log off;
  }

  # ── Health-check para Cloud Run / Load Balancer ──────────────────────────
  location /health {
    access_log off;
    return 200 'ok';
    add_header Content-Type text/plain;
  }
}
